# Example Docker Compose file for the Members Area application.
#
# Copy this file to docker-compose.yml and adjust the environment variables
# to match your environment. Sensitive values can be placed in a .env file
# next to docker-compose.yml (see .env.example).
#
# Build the image first:
#   docker build -f AndreGoepel.MembersArea/AndreGoepel.MembersArea/Dockerfile -t andregoepel-membersarea:latest ./AndreGoepel.MembersArea
#
# Or let Aspire generate the compose file (recommended):
#   dotnet publish AndreGoepel.MembersArea/AndreGoepel.MembersArea.AppHost \
#          --publisher docker \
#          --output ./publish

services:
  andregoepel-membersarea:
    image: andregoepel-membersarea:latest
    build:
      context: ./AndreGoepel.MembersArea
      dockerfile: AndreGoepel.MembersArea/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__members-area-database: >-
        Host=postgres;Port=5432;Database=members-area;
        Username=${DB_USER:-postgres};Password=${DB_PASSWORD:?DB_PASSWORD is required}
      EmailSender__SenderName: ${EMAIL_SENDER_NAME:-Members Area}
      EmailSender__SenderEmail: ${EMAIL_SENDER_EMAIL:?EMAIL_SENDER_EMAIL is required}
      EmailSender__Username: ${SMTP_USERNAME}
      EmailSender__Password: ${SMTP_PASSWORD}
      EmailSender__Port: ${SMTP_PORT:-587}
      EmailSender__Server: ${SMTP_SERVER:?SMTP_SERVER is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: members-area
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d members-area"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
